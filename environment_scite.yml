# SCITE Development Environment Configuration
# ============================================
#
# This file defines the scite_env conda environment that matches
# the Docker deployment configuration. Use this for development
# to ensure consistency with production.

name: scite_env
channels:
  - conda-forge
  - defaults

dependencies:
  # Python version matching Docker
  - python=3.10

  # Core scientific computing dependencies (matching pyproject.toml)
  - numpy>=1.20
  - scipy>=1.7
  - sympy>=1.9
  - matplotlib>=3.3

  # Streamlit for frontend
  - streamlit>=1.28

  # Development tools
  - pip
  - jupyter
  - ipywidgets
  - ipympl

  # Testing
  - pytest>=7.0

  # Version control
  - git

  # Additional pip packages if needed
  - pip:
      - -e . # Install scite package in editable mode
